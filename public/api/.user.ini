; PHP limits for the game API only (per-directory: the admin lives in
; admin/ and is NOT restricted by this - its database restore uploads a
; whole .db file). Shared hosting gives no access to the FPM pool config,
; so this is the only PHP knob we own. The code enforces the same body
; cap itself (Util::jsonBody, FOK_MAX_BODY) - do not rely on this file
; alone: .user.ini needs user_ini.filename enabled on the host.

; The largest legitimate request is a score submission with its replay
; material (FOK_MAX_INPUTS, 256K); 8M (the PHP default) is an invitation
; to waste memory. In-game messages are one MTU - nothing near this.
post_max_size = 512K
; No endpoint here takes an upload.
upload_max_filesize = 0
; JSON in, JSON out. A request needing more than this has a bug.
memory_limit = 64M
; Long polls hold up to poll_wait_max (8 s). This is the backstop for a
; request that hangs anyway; keep it well above the hold.
max_execution_time = 30
