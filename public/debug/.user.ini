; The debug submit endpoint accepts a bundle up to FOK_DEBUG_MAX (8 MB) -
; structured logs plus up to two image snapshots. It is a SEPARATE store from
; the game API (api/.user.ini caps bodies at 512K); this endpoint needs the
; room. The code enforces the 8 MB cap itself (Debug + submit.php), so this
; only has to let the body through.
post_max_size = 12M
; No multipart uploads: the bundle is a single JSON body.
upload_max_filesize = 0
; Decoding an 8 MB JSON bundle to validate it needs headroom.
memory_limit = 128M
max_execution_time = 30
