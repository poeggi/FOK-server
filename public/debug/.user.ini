; The debug bundle is up to FOK_DEBUG_MAX (8 MB) - a separate store from the
; game API (api/.user.ini caps bodies at 512K). The code enforces 8 MB; this
; just lets the body through.
post_max_size = 12M
; One JSON body, never a file upload.
upload_max_filesize = 0
; Headroom to json_decode an 8 MB bundle.
memory_limit = 128M
max_execution_time = 30
